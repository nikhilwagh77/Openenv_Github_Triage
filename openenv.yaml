spec_version: 1
name: mygithubtriage
type: space
runtime: fastapi
app: server.app
port: 7860

tasks:
  - id: "1"
    name: "Broken Link Triage"
    description: "Easy triage: Fix a simple broken footer link."
    grader:
      type: rule_based
      score_range:
        min_exclusive: 0.0
        max_exclusive: 1.0
  - id: "2"
    name: "Security Vulnerability Triage"
    description: "Medium triage: Handle a security dependency vulnerability."
    grader:
      type: rule_based
      score_range:
        min_exclusive: 0.0
        max_exclusive: 1.0
  - id: "3"
    name: "Site Crash Triage"
    description: "Hard triage: Investigate a critical site crash on login."
    grader:
      type: rule_based
      score_range:
        min_exclusive: 0.0
        max_exclusive: 1.0
