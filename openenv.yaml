spec_version: 1
name: mygithubtriage
type: space
runtime: fastapi
app: server.app
port: 7860

tasks:
  - id: "1"
    name: "Broken Link Triage"
    description: "Fix broken footer link"
    grader:
      type: rule_based
      evaluate_on: step
      score_range:
        min_exclusive: 0.0
        max_exclusive: 1.0

  - id: "2"
    name: "Security Vulnerability"
    description: "Handle dependency vulnerability"
    grader:
      type: rule_based
      evaluate_on: step
      score_range:
